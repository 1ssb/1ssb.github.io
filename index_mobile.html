<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Homepage of Subhransu Sekhar Bhattacharjee, PhD Student at the Australian National University.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhransu Sekhar Bhattacharjee - Mobile</title>
    <link rel="icon" type="image/x-icon" href="https://1ssb.github.io/favicon.ico?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" media="print" onload="this.media='all'" onerror="this.onload=null; this.remove();">
    <style>
        /* Minified CSS */
        :root{--bg:url('dark.jpg') no-repeat center center / cover;--color:#fff;--primary-color:#007bff;--hover-color:#FFD700;--border-radius:5px;--transition:.3s}
        html,body{width:100%;margin:0;padding:0;overflow-x:hidden;font-family: 'Lato',sans-serif;background:var(--bg);color:var(--color);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;transition:background-color var(--transition),color var(--transition)}
        .wrapper{width:100%;max-width:100%;margin:0 auto;padding:20px;box-sizing:border-box}
        header{padding:5px}
        header h1{font-size:24px;margin-bottom:10px}
        header h3{font-size:18px;margin-bottom:5px}
        header h3 a{color:inherit;text-decoration:underline}
        .separator{width:60%;height:2px;background:var(--color);margin:10px auto}
        .icons{margin:20px 0;display:flex;justify-content:center;gap:20px}
        .icons a{text-decoration:none;color:var(--color);font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:color var(--transition)}
        .icons a:hover{color:var(--primary-color);text-decoration:none}
        nav ul{list-style-type:none;padding:0;margin:20px 0;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
        nav ul li{flex:1 1 calc(50% - 20px);max-width:200px;box-sizing:border-box}
        nav ul li a{text-decoration:none;color:var(--color);padding:10px 20px;border-radius:var(--border-radius);border:1px solid var(--color);display:block;transition:background var(--transition),color var(--transition);font-size:18px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        nav ul li a:hover{background:var(--color);color:var(--bg)}
        footer{margin-top:20px;font-size:12px;padding:10px}
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Subhransu S. Bhattacharjee</h1>
            <h3>Ph.D. Student</h3>
            <h3><a href="https://comp.anu.edu.au/research/clusters/intelligent-systems/" target="_blank">Intelligent Systems Cluster</a></h3>
            <h4>The Australian National University</h4>
        </header>
        <div class="separator"></div>
        <div class="icons">
            <a href="./Resume.pdf" title="Curriculum Vitae" class="cv-icon">CV</a>
            <a href="https://github.com/1ssb" title="GitHub" target="_blank" class="fab fa-github"></a>
            <a href="https://www.linkedin.com/in/1ssb/" target="_blank" title="LinkedIn" class="fab fa-linkedin-in"></a>
        </div>
        <nav>
            <ul>
                <li><a href="https://1ssb.github.io/bio/">BIO</a></li>
                <li><a href="https://1ssb.github.io/pub/">PUBLICATIONS</a></li>
                <li><a href="https://1ssb.github.io/exp/">EXPERIENCES</a></li>
                <li><a href="https://1ssb.github.io/gallery/">GALLERY</a></li>
                <li><a href="https://1ssb.github.io/contact/">CONTACT</a></li>
            </ul>
        </nav>
        <footer>
            <p>&copy; S. S. Bhattacharjee | Last Updated: <span id="lastUpdated"></span></p>
        </footer>
    </div>
<script type="module" async defer>
    async function loadUpdateContent() {
        try {
            const response = await fetch('update-box.html');
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            const text = await response.text();
            document.getElementById('updateBox').innerHTML = text;
        } catch (error) {
            console.error('Error loading update content:', error);
            document.getElementById('updateBox').innerHTML = '<p>Failed to load content. Please try again later.</p>';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const lastMod = new Date(document.lastModified);
        document.getElementById('lastUpdated').textContent = lastMod.toLocaleDateString('en-US', {
            year: 'numeric', month: 'long'
        });

        loadUpdateContent();
    });
</script>
</body>
</html>
