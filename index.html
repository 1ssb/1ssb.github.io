<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Homepage of Subhransu Sekhar Bhattacharjee, PhD Student at the Australian National University.">
    <meta name="author" content="Subhransu S. Bhattacharjee">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
    <title>Subhransu Sekhar Bhattacharjee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="https://1ssb.github.io/favicon.ico?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    <!-- Mobile-Detect Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mobile-detect/1.4.5/mobile-detect.min.js"></script>
    <!-- Redirection Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var md = new MobileDetect(window.navigator.userAgent);
            if (md.mobile()) {
                window.location.href = "index_mobile.html";
            }
        });
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background: var(--bg-color, url('light_bg.jpg')) no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color, #000);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
    
        body.dark-mode {
            --bg-color: url('dark_bg.png');
            --text-color: #fff;
            --wrapper-bg-color: rgba(30, 30, 30, 0.95); /* Even darker background for dark mode */
            --wrapper-border-color: rgba(255, 255, 255, 0.25);
        }
    
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-color, #000);
            transition: color 0.3s;
        }
    
        #wrapper {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    
        header h1, header h2, header h3, header h4,
        header h3 a, nav ul, nav ul li, nav ul li a {
            margin: 0;
            padding: 5px;
        }
    
        header h3 a {
            color: inherit;
            text-decoration: none;
        }
    
        header h3 a:hover {
            text-decoration: underline;
        }
    
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
    
        nav ul li {
            margin: 10px;
        }
    
        nav ul li a {
            text-decoration: none;
            color: inherit;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: background 0.3s, color 0.3s;
            font-size: 18px;
            display: inline-block;
            min-width: 150px;
            text-align: center;
        }
    
        nav ul li a:hover {
            background: rgba(0, 0, 0, 0.1);
        }
    
        .icons {
            padding: 0;
            margin: 20px 0;
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    
        .icons li {
            display: inline-block;
        }
    
        .icons a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            color: inherit;
            transition: background 0.3s, color 0.3s;
            text-decoration: none;
        }
    
        .icons a:hover {
            background: #f39c12;
            color: #fff;
        }
    
        .separator {
            width: 60%;
            border-top: 2px solid #ddd;
            margin: 20px auto;
        }
    
        .update-box {
            display: none;
            background: rgba(255, 255, 255, 0.5); /* Transparent background */
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center; /* Center the text */
        }
        
        .update-box h2 {
            margin-top: 0; /* Remove top margin from heading */
        }

        .update-container h2 {
            margin-top: 0; /* Remove top margin from heading */
            text-align: center; /* Center the header text */
        }
    
        /* Update box links in light mode */
        .update-box a {
            color: #000;
        }
    
        .update-box a:hover {
            text-decoration: underline;
        }
    
        /* Update box links in dark mode */
        body.dark-mode .update-box a {
            color: #fff;
        }
    
        body.dark-mode .update-box a:hover {
            text-decoration: underline;
        }
        
        footer {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <header id="header">
            <h1>Subhransu S. Bhattacharjee</h1>
            <h3>Ph.D. Student</h3>
            <h3><a href="https://comp.anu.edu.au/research/clusters/intelligent-systems/">Intelligent Systems Cluster</a></h3>
            <h4>The Australian National University</h4>
            <ul class="icons">
                <li><a href="./Resume.pdf" title="Curriculum Vitae" class="ai ai-cv"></a></li>
                <li><a href="https://github.com/1ssb" title="GitHub" target="_blank" class="fab fa-github"></a></li>
                <li><a href="https://www.linkedin.com/in/1ssb/" target="_blank" title="LinkedIn" class="fab fa-linkedin-in"></a></li>
            </ul>
            <div class="separator"></div>
            <div class="update-box" id="update-box">
                <h2>UPDATES</h2>
                <p>Loading content...</p>
            </div>
            <nav>
                <ul>
                    <li><a href="https://1ssb.github.io/bio/">BIO</a></li>
                    <li><a href="https://1ssb.github.io/pub/">PUBLICATIONS</a></li>
                    <li><a href="https://1ssb.github.io/exp/">EXPERIENCES</a></li>
                    <li><a href='https://1ssb.github.io/gallery/'>GALLERY</a></li>
                    <li><a href="https://1ssb.github.io/contact/">CONTACT</a></li>
                </ul>
            </nav>
        </header>
        <footer id="footer">
            <p>&copy; S. S. Bhattacharjee | Last Updated: <span id="lastUpdated"></span></p>
        </footer>
    </div>
    <div id="theme-toggle" class="fas fa-moon"></div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const lastMod = new Date(document.lastModified);
        document.getElementById('lastUpdated').textContent = lastMod.toLocaleDateString('en-US', {
            year: 'numeric', month: 'long'
        });

        const toggleThemeButton = document.getElementById('theme-toggle'); // Corrected ID

        // Initial theme check and icon setup
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.classList.toggle('dark-mode', savedTheme === 'dark');
            toggleThemeButton.classList.toggle('fa-sun', savedTheme === 'dark');
            toggleThemeButton.classList.toggle('fa-moon', savedTheme !== 'dark');
        }

        toggleThemeButton.addEventListener('click', function() {
            const isDarkMode = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            toggleThemeButton.classList.toggle('fa-sun', isDarkMode);
            toggleThemeButton.classList.toggle('fa-moon', !isDarkMode);
        });

        if (typeof SHOW_UPDATE_BOX !== 'undefined' && SHOW_UPDATE_BOX) {
            document.getElementById('updateBox').style.display = 'block';
            document.getElementById('separator').style.display = 'none';
        } else {
            document.getElementById('updateBox').style.display = 'none';
            document.getElementById('separator').style.display = 'block';
        }

        async function loadUpdateContent() {
            try {
                const response = await fetch('update-box.html');
                const text = await response.text();
                document.getElementById('updateBox').innerHTML = text;
            } catch (error) {
                console.error('Error loading update content:', error);
            }
        }

        loadUpdateContent();
    });
</script>
</body>
</html>
